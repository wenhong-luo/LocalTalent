<script>
    function GetRequest() {
        var url = location.search;
        var theRequest = new Object();
        if (url.indexOf("?") != -1) {
            var str = url.substr(1);
            strs = str.split("&");
            for(var i = 0; i < strs.length; i ++) {
                theRequest[strs[i].split("=")[0]] = unescape(strs[i].split("=")[1]);
            }
        }
        return theRequest;
    }
    var row = GetRequest()
    var app = new Vue({
        el:"#app",
        data(){
            return{
                list:[],
                params:{
                    page:1,
                    pagesize:15,
                    recruitment_today_id: "1"
                },
                searchForm:{
                    keyword:"",
                    type:1
                },
                total:0,
                loading:false,
                data:{},
                company_url:"https://demo.74cms.com/company/_id.html",
                job_url:"https://demo.74cms.com/job/_id.html",
            }
        },
        created:function(){
            this.init()
            console.log(this.$route)
        },
        computed: {
            noMore () {
                return this.list.length >= this.total
            },
            disabled () {
                return this.loading || this.noMore
            }
        },
        methods:{
            init(){
                httpget(qscms.apiList.recruitmentCompanyList,{...this.params,...this.searchForm}).then((res) => {
                    console.log(res)
                    const { code,data } = res;
                    if (code == "200"){
                        this.list.push(...data.items)
                        console.log(this.list)
                        this.total = data.total
                        this.loading = false
                    }
                }).catch(() => {})
            },
            searchClick(){
                this.params.page = 1;
                this.list = []
                this.init()
            },
            load(){
                this.loading = true
                if (this.list.length == 0){
                    this.loading = false
                    return
                } else if (this.list.length >= this.total) {
                    this.loading = false
                    return
                }else {
                    this.params.page++
                    this.init()
                }
            },
            companyUrl:function(id){
                return this.company_url.replace('_id',id)
            },
            jobUrl:function(id){
                return this.job_url.replace('_id',id)
            },
        }
    })
</script>
