spring:
  application:
    name: localtalent-backend
  datasource:
    url: ${LOCALTALENT_DB_URL:jdbc:mysql://localhost:3306/localtalent?useUnicode=true&characterEncoding=utf8&connectionTimeZone=Asia/Shanghai}
    username: ${LOCALTALENT_DB_USERNAME:localtalent}
    password: ${LOCALTALENT_DB_PASSWORD:localtalent}
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-on-migrate: true

localtalent:
  auth:
    jwt:
      secret: ${LOCALTALENT_JWT_SECRET:localtalent-dev-jwt-secret-change-before-production-2026}
      ttl-seconds: ${LOCALTALENT_JWT_TTL_SECONDS:7200}
  minio:
    endpoint: ${LOCALTALENT_MINIO_ENDPOINT:http://localhost:9000}
    access-key: ${LOCALTALENT_MINIO_ACCESS_KEY:localtalent}
    secret-key: ${LOCALTALENT_MINIO_SECRET_KEY:localtalent123}
    bucket: ${LOCALTALENT_MINIO_EXPORT_BUCKET:export}
  export:
    download-ttl-seconds: ${LOCALTALENT_EXPORT_DOWNLOAD_TTL_SECONDS:900}
