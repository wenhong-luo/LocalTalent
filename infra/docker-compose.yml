services:
  mysql:
    image: mysql:8.4
    container_name: localtalent-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: localtalent_root
      MYSQL_DATABASE: localtalent
      MYSQL_USER: localtalent
      MYSQL_PASSWORD: localtalent
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -plocaltalent_root"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - localtalent

  redis:
    image: redis:8.0-alpine
    container_name: localtalent-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - localtalent

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: localtalent-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: localtalent
      MINIO_ROOT_PASSWORD: localtalent123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    networks:
      - localtalent

volumes:
  mysql-data:
  redis-data:
  minio-data:

networks:
  localtalent:
    name: localtalent-network
